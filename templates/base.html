<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}Study Planner — Manage your assignments and study tasks in one place.{% endblock %}" />
  <meta name="theme-color" content="#4f46e5" />
  <title>{% block title %}Study Planner{% endblock %}</title>

  {% load static %}

  <!-- DNS preconnect for CDN -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">

  {% include "partials/navbar.html" %}

  {% if messages %}
  <div class="container mt-3" role="alert" aria-live="polite" aria-atomic="true">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main id="main-content" class="flex-grow-1" tabindex="-1">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmta39mFPQ3FsIxHSX30/UJ/1YJHh"
    crossorigin="anonymous"
    defer
  ></script>
  <script src="{% static 'js/main.js' %}" defer></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
