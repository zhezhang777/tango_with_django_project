{% load static %}
<a class="visually-hidden-focusable skip-link" href="#main-content">Skip to main content</a>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm" aria-label="Main navigation">
  <div class="container">

    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'tasks:dashboard' %}">
      <i class="bi bi-journal-bookmark-fill" aria-hidden="true"></i>
      Study Planner
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      {% if user.is_authenticated %}
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             aria-current="{% if request.resolver_match.url_name == 'dashboard' %}page{% endif %}"
             href="{% url 'tasks:dashboard' %}">
            <i class="bi bi-speedometer2 me-1" aria-hidden="true"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'task' in request.resolver_match.url_name %}active{% endif %}"
             aria-current="{% if 'task' in request.resolver_match.url_name %}page{% endif %}"
             href="{% url 'tasks:task_list' %}">
            <i class="bi bi-list-task me-1" aria-hidden="true"></i>Tasks
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'course' in request.resolver_match.url_name %}active{% endif %}"
             aria-current="{% if 'course' in request.resolver_match.url_name %}page{% endif %}"
             href="{% url 'tasks:course_list' %}">
            <i class="bi bi-book me-1" aria-hidden="true"></i>Courses
          </a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-1"
             href="#"
             role="button"
             data-bs-toggle="dropdown"
             aria-expanded="false"
             aria-haspopup="true"
             aria-label="User menu">
            <i class="bi bi-person-circle" aria-hidden="true"></i>
            {{ user.username }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                <i class="bi bi-person me-2" aria-hidden="true"></i>Profile
              </a>
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="dropdown-item text-danger">
                  <i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>Log Out
                </button>
              </form>
            </li>
          </ul>
        </li>
      </ul>

      {% else %}
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'accounts:login' %}">Log In</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'accounts:register' %}">Sign Up</a>
        </li>
      </ul>
      {% endif %}
    </div>

  </div>
</nav>
